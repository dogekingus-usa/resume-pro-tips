name: Setup DNS for RPT Custom Domain

on:
  workflow_dispatch:

jobs:
  setup-dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add CNAME record for Cloudflare Pages
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ZONE_ID=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=resumeprotips.com" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d['success'] else '')")
          if [ -z "$ZONE_ID" ]; then echo "ERROR: Could not find zone"; exit 1; fi
          echo "Zone ID: $ZONE_ID"
          # Delete existing A records
          EXISTING=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=resumeprotips.com")
          for RECORD_ID in $(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(r['id']) for r in d.get('result',[])]" 2>/dev/null); do
            echo "Deleting A record: $RECORD_ID"; curl -s -X DELETE -H "Authorization: Bearer $CF_API_TOKEN" "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID"
          done
          # Add CNAME record
          RESULT=$(curl -s -X POST -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"resumeprotips.com","content":"resume-pro-tips.pages.dev","ttl":1,"proxied":true}' \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records")
          echo "CNAME result: $RESULT"
