    <h1>5 Resume Mistakes Costing You Jobs</h1>
    <div class="meta">3 min read * Short Form * Updated May 2026</div>

    <p>Your resume has about <strong>7 seconds</strong> to make an impression. Recruiters and applicant tracking systems (ATS) are ruthless with bad formatting, weak language, and missing keywords. Here are the five most expensive mistakes -- and exactly how to fix them.</p>

    <h2><span class="mistake-num">Mistake #1:</span> The "List of Duties" Trap</h2>
    <p><strong>The problem:</strong> Your resume reads like a job description -- "Responsible for managing social media" -- telling recruiters <em>what</em> you were asked to do, not <em>what you accomplished</em>.</p>
    <div class="fix-box">
      <p><strong>✓ Fix:</strong> Replace every duty with a result. Use <strong>Action + Metric + Outcome</strong>.<br>
      <em>Instead of:</em> "Managed social media accounts"<br>
      <em>Write:</em> "Grew Instagram following 340% in 6 months through daily content and influencer partnerships."</p>
    </div>

    <h2><span class="mistake-num">Mistake #2:</span> Generic Objective Statement</h2>
    <p><strong>The problem:</strong> "Seeking a challenging position where I can utilize my skills" -- this sentence is on 40% of resumes. It adds zero value.</p>
    <div class="fix-box">
      <p><strong>✓ Fix:</strong> Delete it. Replace with a 2-line professional summary: your title, years of experience, and one standout achievement. Example: "Marketing Manager with 8 years driving B2B growth. Generated $2.4M in pipeline in 2025."</p>
    </div>

    <h2><span class="mistake-num">Mistake #3:</span> Ignoring ATS Keywords</h2>
    <p><strong>The problem:</strong> Over 75% of companies use ATS software. If the job asks for "Salesforce" and your resume says "CRM," the system flags you as a mismatch.</p>
    <div class="fix-box">
      <p><strong>✓ Fix:</strong> Copy the job description into a word cloud. Identify the top 15-20 keywords and mirror them naturally in your resume -- only if they genuinely apply. Weave them into your bullet points.</p>
    </div>

    <h2><span class="mistake-num">Mistake #4:</span> Wall of Text Formatting</h2>
    <p><strong>The problem:</strong> Dense paragraphs with no bullet points or white space. Recruiters scan, they don't read.</p>
    <div class="fix-box">
      <p><strong>✓ Fix:</strong> Use short bullet points (1-2 lines each), 0.5" margins, and a clean sans-serif font at 10-12pt. Your resume should be scannable in under 10 seconds.</p>
    </div>

    <h2><span class="mistake-num">Mistake #5:</span> Including "References Available Upon Request"</h2>
    <p><strong>The problem:</strong> This outdated line takes up space. Every recruiter knows they can ask for references.</p>
    <div class="fix-box">
      <p><strong>✓ Fix:</strong> Delete it. Use that space for one more bullet point of results. Only provide references on request.</p>
    </div>

    <p><strong>Bottom line:</strong> Your resume is a marketing document, not a biography. Every line should sell your ability to solve the employer's problems.</p>
