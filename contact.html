<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | ResumeProTips</title>
<meta name="description" content="Get in touch with the ResumeProTips team. We'd love to hear from you.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://resumeprotips.com/contact.html">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,system-ui,-apple-system,sans-serif;background:#0a0f1a;color:#f1f5f9;line-height:1.8;padding:2rem}
.container{max-width:600px;margin:0 auto}
h1{font-size:2rem;margin-bottom:0.5rem;background:linear-gradient(135deg,#2563eb,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
p{color:#94a3b8;margin-bottom:2rem;font-size:0.938rem}
a{color:#3b82f6}
.back{margin-bottom:2rem;display:inline-block;color:#3b82f6;text-decoration:none}
.form-group{margin-bottom:1.5rem}
label{display:block;color:#cbd5e1;font-size:0.875rem;font-weight:500;margin-bottom:0.5rem}
input,textarea{width:100%;padding:0.75rem 1rem;background:rgba(255,255,255,0.03);border:1px solid rgba(2563eb,0.3);border-radius:10px;color:#f1f5f9;font-size:0.938rem;font-family:Inter,sans-serif;outline:none;transition:border-color 0.3s}
input:focus,textarea:focus{border-color:#3b82f6}
textarea{min-height:120px;resize:vertical}
button{padding:0.75rem 2rem;background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;border:none;border-radius:10px;font-size:0.938rem;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;transition:all 0.3s}
button:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(2563eb,0.3)}
</style>
</head>
<body>
<div class="container">
<a href="/" class="back">&larr; Back to ResumeProTips</a>
<h1>Contact Us</h1>
<p>Have a question, suggestion, or just want to say hi? Fill out the form below and we'll get back to you.</p>
<form onsubmit="return handleContact(event)">
<div class="form-group"><label for="name">Name</label><input type="text" id="name" required placeholder="Your name"></div>
<div class="form-group"><label for="email">Email</label><input type="email" id="email" required placeholder="your@email.com"></div>
<div class="form-group"><label for="message">Message</label><textarea id="message" required placeholder="How can we help?"></textarea></div>
<button type="submit">Send Message</button>
</form>
<p style="margin-top:2rem;font-size:0.813rem;color:#64748b">Or email us directly at hello@resumeprotips.com</p>
<script>function handleContact(e){e.preventDefault();const btn=e.target.querySelector('button');btn.textContent='Sent!';btn.disabled=true;btn.style.background='linear-gradient(135deg,#059669,#10b981)';setTimeout(()=>{window.location.href='/'},2000);return false}</script>
</div>
</body>
</html>
