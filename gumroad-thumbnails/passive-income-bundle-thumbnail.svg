<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c1917dd;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#g)" rx="12"/>
  <!-- Accent bar top -->
  <rect x="0" y="0" width="500" height="6" fill="#f59e0b"/>
  <!-- Icon -->
  <text x="250" y="140" font-size="80" text-anchor="middle">🎯</text>
  <!-- Category badge -->
  <rect x="190" y="175" width="120" height="26" rx="13" fill="#f59e0b22" stroke="#f59e0b" stroke-width="1"/>
  <text x="250" y="193" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="600" letter-spacing="1">BUNDLE</text>
  <!-- Title -->
  <text x="250" y="280" font-family="system-ui,sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="700">
    <tspan x="250" dy="0">Passive Income Bundle</tspan>
    
  </text>
  <!-- Divider -->
  <rect x="200" y="330" width="100" height="2" rx="1" fill="#f59e0b" opacity="0.5"/>
  <!-- Price -->
  <text x="250" y="365" font-family="system-ui,sans-serif" font-size="36" fill="#f59e0b" text-anchor="middle" font-weight="800">$39.99</text>
  <!-- CTA -->
  <rect x="150" y="395" width="200" height="44" rx="22" fill="#f59e0b" opacity="0.9"/>
  <text x="250" y="422" font-family="system-ui,sans-serif" font-size="15" fill="#fff" text-anchor="middle" font-weight="600">Buy on Gumroad →</text>
  <!-- Brand -->
  <text x="250" y="480" font-family="system-ui,sans-serif" font-size="10" fill="#444" text-anchor="middle" letter-spacing="2">COD-X DIGITAL STORE</text>
</svg>