<h1>How to Ask for a Raise: Scripts That Actually Work</h1>
<div class="meta">Published: May 14, 2026 | Reading time: 4 min</div>
<h2>Introduction to Asking for a Raise</h2>
<p>Requesting a salary increase can be daunting, but it's an essential part of career growth and personal satisfaction. This guide will provide you with scripts that actually work, along with actionable tips to ensure your request is successful.</p>

<h2>Research Your Worth</h2>
<p><strong>Actionable Tip:</strong> Before approaching your manager, do thorough research on the market value for your role. Use resources like <a href="https://www.salary.com/">Salary.com</a>, Glassdoor, or industry-specific salary surveys to gather data.</p>

<h2>The Opening Script: A Personal Approach</h2>
<p><strong>Script:</strong></p>
<blockquote>
    <p>"Hi [Manager's Name], I wanted to take a moment to reflect on my time here. Over the past year, we've achieved several key milestones, and I believe it would be fair for me to discuss potential salary adjustments. Could we schedule a meeting next week to explore this?"</p>
</blockquote>

<h2>Highlight Your Achievements</h2>
<p><strong>Actionable Tip:</strong> Prepare a list of your accomplishments and specific contributions that have positively impacted the company.</p>

<h3>Samples of Contributions</h3>
<ul>
    <li>Increased sales by X% over the past year</li>
    <li>Reduced operational costs by Y dollars per month</li>
    <li>Led successful projects that met or exceeded goals</li>
</ul>

<h2>The Core Script: Focusing on Value and Future Potential</h2>
<p><strong>Script:</strong></p>
<blockquote>
    <p>"Thanks for taking the time to meet with me. In my role, I've consistently delivered results that have added significant value to our team. For instance, [mention a specific achievement]. Moving forward, I see myself contributing even more and am open to discussing adjustments that better reflect this impact."</p>
</blockquote>

<h2>Prepare for the Discussion</h2>
<p><strong>Actionable Tip:</strong> Anticipate potential concerns your manager might have. Prepare counterpoints or additional information to address any doubts they may raise.</p>

<h2>The Follow-Up Script: Ensuring a Positive Outcome</h2>
<p><strong>Script:</strong></p>
<blockquote>
    <p>"Thank you for our discussion today. I'm excited about the opportunity to continue growing with [Company Name]. If there are any further steps or information needed, please let me know. Looking forward to contributing even more in the coming months."</p>
</blockquote>

<h2>Conclusion: Embrace the Process</h2>
<p>Remember, asking for a raise is about positioning yourself as an asset and advocate for your worth. By preparing thoroughly and using these scripts, you can navigate this process with confidence.</p>

<p><strong>Actionable Tip:</strong> If your initial request isn't fully met, follow up in two to three months after discussing next steps or additional responsibilities that could justify a higher salary.</p>
