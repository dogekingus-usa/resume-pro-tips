    <h1>How to Negotiate Salary After a Job Offer</h1>

    <div class="meta">Published: May 17, 2026 | Updated: May 17, 2026 | 9 min read</div>



    <p>You got the offer. Congratulations! The months of resumes, cover letters, and interviews have paid off. But here's a statistic that might make you uncomfortable: according to a 2025 study by Payscale, <strong>84% of employers expect you to negotiate</strong> and build room into their initial offer specifically for that purpose. Yet only 37% of candidates actually negotiate. The ones who do walk away with an average of 7-15% more than their initial offer ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  and in tech and finance roles, that number can reach 25%.</p>



    <p>The reason most people don't negotiate is fear. Fear of looking greedy. Fear of the offer being rescinded. Fear of awkward conversations. But here's the truth: a well-executed salary negotiation doesn't damage your relationship with your future employer ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  it <em>strengthens</em> it. It signals that you know your value, you've done your homework, and you're a professional who can handle difficult conversations with grace. In this guide, I'll walk you through every step of negotiating your salary after a job offer, with exact scripts you can use, timing strategies, and tactics that actually work in 2026.</p>



    <h2>Step 1: Don't Say Yes Immediately</h2>

    <p>The moment you receive a job offer, your instinct will be to say "yes" out of excitement and relief. Don't. The single most powerful move you can make is to express enthusiasm and ask for time to review the offer. Here's exactly what to say:</p>



    <div class="script-box">

      <h3>Script: Buying Time</h3>

      <p>Say this verbatim when you receive the offer (phone, email, or video call):</p>

      <p class="line">"Thank you so much! I'm genuinely excited about this opportunity. I'd like to take 24-48 hours to review the full offer package carefully. Can I follow up with you on [specific day]?"</p>

      <p>That's it. Every successful negotiation starts with this pause. It gives you time to research, prepare your counter, and ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  most importantly ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  it signals that you're not desperate.</p>

    </div>



    <p>During this 24-48 hour window, you'll do your research. Don't waste it celebrating. Here's what you need to prepare.</p>



    <h2>Step 2: Research Your Market Value</h2>

    <p>Before you can negotiate, you need to know what you're worth. In 2026, there are more salary data sources than ever, but not all of them are accurate. Here are the most reliable resources:</p>



    <table>

      <tr>

        <th>Source</th>

        <th>Best For</th>

        <th>Data Quality</th>

      </tr>

      <tr>

        <td>Levels.fyi</td>

        <td>Tech &amp; engineering roles</td>

        <td>Excellent ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  crowdsourced with verification</td>

      </tr>

      <tr>

        <td>Blind</td>

        <td>Big tech, finance, consulting</td>

        <td>Good ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  anonymous but high volume</td>

      </tr>

      <tr>

        <td>Glassdoor</td>

        <td>General roles across industries</td>

        <td>Moderate ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  tends to lag behind market</td>

      </tr>

      <tr>

        <td>LinkedIn Salary</td>

        <td>Mid-to-senior roles</td>

        <td>Good ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  filtered by location, experience</td>

      </tr>

      <tr>

        <td>Fishbowl</td>

        <td>Consulting, finance, law</td>

        <td>Good ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  peer-verified data</td>

      </tr>

      <tr>

        <td>Bureau of Labor Statistics</td>

        <td>Government &amp; regulated industries</td>

        <td>Excellent ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  but broad categories</td>

      </tr>

    </table>



    <p>Gather at least 5-8 data points for your specific role, experience level, and geographic location. If you're in a fully remote role, use national data rather than local ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  you're competing in a global talent pool, and your salary should reflect that.</p>



    <div class="highlight-box">

      <p><strong>Key Insight:</strong> Don't just find the average. Find the <em>range</em>. The top 25th percentile for your role is where you should anchor your negotiation. Companies budget for top talent, not average talent.</p>

    </div>



    <h2>Step 3: Evaluate the Entire Compensation Package</h2>

    <p>Salary is only one piece of the puzzle. Before you craft your counter, look at everything the employer is offering:</p>

    <ul>

      <li><strong>Base salary</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  the starting point for everything else</li>

      <li><strong>Signing bonus</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  one-time cash, often negotiable even when salary isn't</li>

      <li><strong>Equity or stock options</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  critical in startups and tech companies</li>

      <li><strong>Annual bonus target</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  usually 5-20% of base salary</li>

      <li><strong>Performance-based bonuses</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  tied to individual or company milestones</li>

      <li><strong>401(k) matching</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  effectively free money, worth 3-6% of salary</li>

      <li><strong>Health insurance premiums</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  can be worth $5,000-$15,000/year</li>

      <li><strong>Remote work stipend</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  home office budget, internet, etc.</li>

      <li><strong>Professional development</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  conference budgets, course reimbursements</li>

      <li><strong>Paid time off (PTO)</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  extra vacation days are often negotiable</li>

      <li><strong>Flexible hours</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  hard to value, but life-changing in practice</li>

    </ul>



    <p>If the base salary is firm (some companies have strict pay bands), you can still negotiate on signing bonus, equity, PTO, or a performance review timeline. A shorter ramp to your first review (6 months instead of 12) with a guaranteed raise can be worth more than an extra $5,000 upfront.</p>



    <h2>Step 4: Craft Your Counter-Offer</h2>

    <p>Now that you have your market research and a full picture of the offer, it's time to decide what to ask for. Here's the framework:</p>



    <div class="highlight-box">

      <p><strong>The Rule of Three:</strong> Pick three things to negotiate. Lead with the most important one (usually base salary), and frame the other two as "if we can get close on salary, I'd also like to discuss equity and vacation." This gives you multiple paths to a "yes" and prevents the conversation from dying on a single point.</p>

    </div>



    <p>Your target should be 10-20% above the initial offer. Here's why: employers typically build 10-15% buffer into their first offer. By asking for 15-20%, you end up in the middle of their actual range, which is exactly where they expect to land. Never ask for less than 10% unless the offer is already at the top of the market range.</p>



    <p>Frame your ask around <strong>value delivered, not personal need</strong>. Never say "I need more money because my rent went up." Instead, say "Based on my track record scaling revenue by 30% at my last company and the market data for this role, I was hoping we could land in the $X-$Y range."</p>



    <h2>Step 5: Make the Call</h2>

    <p>When you're ready to negotiate, request a phone or video call. Email is fine for formal counter-offers, but a live conversation lets you read tone, express enthusiasm, and build rapport. Here's the exact script:</p>



    <div class="script-box">

      <h3>Script: The Negotiation Call</h3>

      <p class="line">"Hi [Recruiter/Hiring Manager], thanks again for the offer. I've had time to review the full package, and I'm really excited about the role and the team. I do have a few things I'd like to discuss."</p>

      <p class="line" style="margin-top:0.8rem;">"Based on my research into market rates for this role at comparable companies, and considering my [specific accomplishment] experience that I'd bring to this position, I was hoping we could look at a base salary closer to $[your target]. I'd also like to discuss the equity package and [third item]."</p>

      <p class="line" style="margin-top:0.8rem;">"I want to be clear ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  I'm very interested in joining the team, and I believe I can make an immediate impact. I just want to make sure the compensation reflects the value I'll bring."</p>

    </div>



    <p>Notice what this script does well: it starts with gratitude and enthusiasm (reduces tension), states the ask clearly (no ambiguity), provides a rationale (not a demand), and reaffirms commitment to the role (they won't worry you're about to walk).</p>



    <h2>Step 6: Handle the Response</h2>

    <p>Your counter-offer will get one of three responses. Here's how to handle each:</p>



    <h3>Response A: "Yes, we can do that."</h3>

    <p>This happens more often than you'd think. If they immediately agree to your ask, you either asked too low or they really want you. <strong>Don't get greedy here.</strong> Thank them, confirm the details in writing, and move to the next step. If you genuinely asked for more than expected, you can say "That's great news, thank you. Let me review the updated offer and confirm formally tomorrow."</p>



    <h3>Response B: "We can't go that high, but we can do X."</h3>

    <p>This is the most common outcome. If their counter is within 5% of your target, take it. If it's lower, pivot to your second and third negotiation items. "I understand budget constraints. If $X is the best you can do on base, could we increase the signing bonus to $Y or add an additional week of PTO?"</p>



    <div class="highlight-box">

      <p><strong>Pro Tip:</strong> Ask for a 6-month performance review with a guaranteed increase. "If base salary is fixed right now, could we schedule a review at 6 months where we revisit based on my contributions, with a target increase of X%?" Most employers will agree to this because it's contingent on performance ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  which they're confident about since they just hired you.</p>

    </div>



    <h3>Response C: "This is our final offer."</h3>

    <p>Take it at face value. Some companies genuinely have rigid pay bands (government, universities, some large corporations). If they say "final," believe them. But before you accept, ask: "I appreciate you being transparent. Is there any flexibility on equity, signing bonus, or start date? I'm still very interested in the role." Sometimes "final" applies only to base salary.</p>



    <h2>What NOT to Do</h2>

    <p>Equal in importance to what you should do is what you shouldn't. Avoid these common negotiation-killing mistakes:</p>

    <ul>

      <li><strong>Don't bluff with an offer you don't have.</strong> Saying "I have another offer for $X more" when you don't will torpedo your credibility if they call your bluff.</li>

      <li><strong>Don't negotiate over email on a Friday.</strong> Negotiate Tuesday through Thursday morning when decision-makers are fresh and the energy is positive.</li>

      <li><strong>Don't make it personal.</strong> Never mention your rent, student loans, or lifestyle goals. Keep it professional: market value + your impact = fair compensation.</li>

      <li><strong>Don't negotiate just one thing.</strong> Always have a BATNA (Best Alternative to a Negotiated Agreement). If base salary is firm, what's your backup ask?</li>

      <li><strong>Don't accept on the call.</strong> Even if they meet your exact ask, say "Let me review the updated offer and get back to you tomorrow." This gives you space to think clearly.</li>

    </ul>



    <h2>When NOT to Negotiate</h2>

    <p>There are rare cases where negotiating is genuinely inadvisable:</p>

    <ul>

      <li><strong>Government roles</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  pay is determined by a fixed scale based on grade and step. There's usually no room to move.</li>

      <li><strong>Union positions</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  collective bargaining agreements set wages. Individual negotiation is typically not allowed.</li>

      <li><strong>Entry-level in a flooded market</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  if there are 300 qualified applicants for the role, negotiating your first job out of college may risk the offer.</li>

      <li><strong>When the offer is already exceptional</strong> ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  if the initial offer is at the top 90th percentile for your role, level, and location, accept it graciously and ask about the performance review timeline.</li>

    </ul>



    <div class="highlight-box">

      <p><strong>The Golden Rule:</strong> You can always negotiate if you do it with respect, research, and professionalism. The worst that happens is they say no ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  and you're still in the same position you were before you asked. 84% of employers expect it. Don't be part of the 63% who leave money on the table.</p>

    </div>



    <h2>Final Checklist Before You Accept</h2>

    <p>Once the negotiation is complete and you have the best offer you can get, run through this checklist before signing:</p>

    <ul>

      <li>ƒÆ'' ¢ƒâEUR¹...âEURœƒâEURš'  Base salary confirmed in writing</li>

      <li>ƒÆ'' ¢ƒâEUR¹...âEURœƒâEURš'  Signing bonus and terms documented</li>

      <li>ƒÆ'' ¢ƒâEUR¹...âEURœƒâEURš'  Equity or stock options with vesting schedule included</li>

      <li>ƒÆ'' ¢ƒâEUR¹...âEURœƒâEURš'  Annual bonus targets and criteria stated</li>

      <li>ƒÆ'' ¢ƒâEUR¹...âEURœƒâEURš'  Start date agreed upon</li>

      <li>ƒÆ'' ¢ƒâEUR¹...âEURœƒâEURš'  Benefits package summary received</li>

      <li>ƒÆ'' ¢ƒâEUR¹...âEURœƒâEURš'  PTO and holiday schedule confirmed</li>

      <li>ƒÆ'' ¢ƒâEUR¹...âEURœƒâEURš'  Any verbal promises (6-month review timeline, etc.) documented in email</li>

      <li>ƒÆ'' ¢ƒâEUR¹...âEURœƒâEURš'  All communication is with one point of contact (usually recruiter or HR)</li>

    </ul>



    <p>Remember: the negotiation doesn't end when you accept. Your first 90 days on the job are an extended negotiation ƒÆ'' ¢ƒ ¢¢â'¬Å¡' ¬ƒ ¢¢âEURš ¬'  prove your value, exceed expectations, and you'll be in a much stronger position when your first performance review arrives. The skills you just used to negotiate your offer are the same skills that will make you a top performer: preparation, communication, and the confidence to ask for what you're worth.</p>
