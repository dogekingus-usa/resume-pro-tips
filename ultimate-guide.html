    <h1>ðŸ"- The Ultimate Guide to Writing a Resume That Gets Interviews</h1>
    <p>A step-by-step framework for crafting a resume that passes ATS screening and impresses hiring managers.</p>
</header>
<div class="container">
    
        <div class="guide-section">
            <div class="section-number">1</div>
            <h2>Why Most Resumes Get Rejected</h2>
            <p>Recruiters spend an average of 7 seconds scanning a resume. ATS bots reject 75% of applications before a human sees them. Your resume must pass both screens.</p>
        </div>
        <div class="guide-section">
            <div class="section-number">2</div>
            <h2>The Golden Rule of Resume Writing</h2>
            <p>Never write what you did. Write what you achieved. Quantify everything. Instead of 'Managed a team,' write 'Led a team of 12 to exceed quarterly targets by 35%.'</p>
        </div>
        <div class="guide-section">
            <div class="section-number">3</div>
            <h2>Step 1: Choose the Right Format</h2>
            <p>Chronological (most common, preferred by recruiters), Functional (skill-based, for career changers), or Hybrid (combination). Use chronological unless you have a specific reason not to.</p>
        </div>
        <div class="guide-section">
            <div class="section-number">4</div>
            <h2>Step 2: Write a Killer Summary</h2>
            <p>3 sentences maximum. Who you are, what you do, and your biggest achievement. Example: 'Senior Marketing Manager with 8+ years driving B2B growth. Generated $5M+ pipeline in 2025 through data-driven campaigns.'</p>
        </div>
        <div class="guide-section">
            <div class="section-number">5</div>
            <h2>Step 3: Optimize for ATS</h2>
            <p>Study the job description and mirror keywords naturally. Use standard section headings. Avoid tables, columns, and graphics. Save as PDF.</p>
        </div>
        <div class="guide-section">
            <div class="section-number">6</div>
            <h2>Step 4: Quantify Your Achievements</h2>
            <p>Every bullet point should include a number, percentage, or dollar amount. Use the formula: Action + Context + Result = Impact.</p>
        </div>
        <div class="guide-section">
            <div class="section-number">7</div>
            <h2>Step 5: Tailor for Each Job</h2>
            <p>Customize your summary and top 3 bullet points for each application. It takes 10 minutes and doubles your interview chances.</p>
        </div>
        <div class="guide-section">
            <div class="section-number">8</div>
            <h2>Common Mistakes</h2>
            <p>Spelling errors (instant rejection), too long (keep to 1 page), too short (lack of substance), generic objective statements, listing duties instead of achievements.</p>
        </div>
